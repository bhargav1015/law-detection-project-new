<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="400">
  <rect width="100%" height="100%" fill="#fff"/>
  <style>
    .mono { font-family: monospace; font-size:14px; fill:#111 }
    .box { font-family: Arial, sans-serif; font-size:13px; fill:#000 }
  </style>
  <text x="20" y="30" class="box">Frontend (index.html / js/script.js)</text>
  <text x="300" y="30" class="box">→ POST /analyze</text>
  <text x="460" y="30" class="box">Flask API (backend/app.py)</text>

  <text x="520" y="80" class="box">Inference Chain</text>
  <text x="380" y="120" class="box">TF-IDF Classifier (model.joblib)</text>
  <text x="520" y="120" class="box">Embeddings k-NN (embeddings.npz)</text>
  <text x="700" y="120" class="box">Keyword Rules</text>

  <text x="540" y="180" class="box">Suggest laws/defenses</text>
  <text x="540" y="220" class="box">→ History (backend/history.json)</text>
  <text x="540" y="250" class="box">→ Logs (backend/logs/analysis.log)</text>

  <line x1="140" y1="30" x2="280" y2="30" stroke="#333" stroke-width="1" />
  <line x1="360" y1="40" x2="380" y2="110" stroke="#333" stroke-width="1" />
  <line x1="500" y1="40" x2="500" y2="110" stroke="#333" stroke-width="1" />
  <line x1="680" y1="40" x2="680" y2="110" stroke="#333" stroke-width="1" />
  <line x1="460" y1="140" x2="540" y2="170" stroke="#333" stroke-width="1" />
  <line x1="620" y1="140" x2="540" y2="170" stroke="#333" stroke-width="1" />
  <line x1="740" y1="140" x2="540" y2="170" stroke="#333" stroke-width="1" />
</svg>
