
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="icon" href="images/favicon.svg" type="image/svg+xml">
<title>Analyze Case</title>
<link rel="stylesheet" href="css/style.css">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="container mt-5">

<h2 class="text-center">🧠 Case Analysis</h2>

<div class="analysis-box mt-4">
<div id="inputError"></div>

<label class="form-label">Case Description</label>
<textarea id="caseText" class="form-control" rows="6" placeholder="Enter case details here..."></textarea>

<br>

<label class="form-label">Upload Case Files</label>
<div class="drop-area">
<p>Drag & Drop files here</p>
<input id="caseFiles" type="file" multiple>
</div>

<br>

<button class="btn btn-success btn-lg w-100" onclick="analyzeCase()">Analyze Case</button>
<div class="text-center mt-3">
	<a href="history.html" class="btn btn-outline-primary">View Previous Analyses</a>
</div>

</div>

</div>

<script src="js/script.js"></script>

</body>
</html>
